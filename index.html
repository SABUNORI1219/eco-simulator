<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wynncraft Guild War Economy Simulator</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="loading"><div class="spinner"></div><span>Loading map data…</span></div>
<canvas id="canvas"></canvas>

<!-- Overview Panel -->
<div class="panel" id="overview">
  <h2>📊 OVERVIEW</h2>
  <div id="overview-body">
    <div style="color:#64748b;font-size:12px;">Add territories to see balance.</div>
  </div>
</div>

<!-- Controls Panel -->
<div class="panel" id="controls">
  <h2>🏴 TERRITORY MANAGER</h2>

  <div class="ctrl-section">
    <h3>Add Specified Territory</h3>
    <select id="territory-select"><option value="">— select territory —</option></select>
    <button class="primary" onclick="addSelectedTerritory()">Add Territory</button>
  </div>

  <div class="ctrl-section">
    <h3>Add from Guild (Live)</h3>
    <select id="guild-select"><option value="">— loading guilds… —</option></select>
    <button class="primary" onclick="addGuildTerritories()">Add Guild's Territories</button>
  </div>

  <div class="ctrl-section">
    <h3>Added Territories (<span id="added-count">0</span>)</h3>
    <button class="danger" onclick="clearAllTerritories()">Clear All</button>
    <div class="territory-list" id="territory-list"></div>
  </div>
</div>

<!-- Territory Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">Territory Settings</h2>

    <div id="modal-stats"></div>

    <div class="modal-section">
      <label>Defense Settings</label>
      <div class="bonus-grid" id="defense-grid"></div>
    </div>

    <div class="modal-section">
      <label>Headquarters</label>
      <div class="hq-row">
        <input type="checkbox" id="modal-hq" onchange="updateModalStats()">
        <span>Make this the HQ (only one allowed)</span>
      </div>
    </div>

    <div class="modal-section">
      <label>Bonuses</label>
      <div class="bonus-grid" id="bonus-grid"></div>
    </div>

    <div id="modal-footer">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="saveModal()">💾 Save</button>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<script src="./script.js"></script>
</body>
</html>
